<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Interior visualization and film portfolio by Hyeongeol Lim.">
    <meta name="theme-color" content="#080808">
    <title>Portfolio | Hyeongeol Lim</title>

    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="loader">

    <div class="loader-content">

        <h1 id="loaderTitle">PORTFOLIO</h1>

        <div class="loaderSelected" id="loaderSelected">

            <span></span>

            <p>Selected Works</p>

            <span></span>

        </div>

    </div>

</div>
    
<div id="app">

    <!-- ===========================
            PAGE 01
    ============================ -->

    <section class="page cover-page active">

        <div class="cover-content">

            <h1>PORTFOLIO</h1>

            <div class="selected">

                <span></span>

                <p>Selected Works</p>

                <span></span>

            </div>

        </div>

    </section>



    <!-- ===========================
            PAGE 02
    ============================ -->

    <section class="page intro-page">

        <div class="intro-content">

    <h1>INTERIOR VISUALIZATION</h1>

    <p class="intro-tools">
        3ds Max · V-Ray · Photoshop
    </p>

    <h2>Hyeongeol Lim</h2>

</div>

    </section>



    <!-- ===========================
            PAGE 03 · CATEGORY
    ============================ -->

    <section class="page media-menu-page">

        <div class="media-menu-content">

            <p class="media-menu-eyebrow">SELECT CATEGORY</p>

            <h1>PROJECT ARCHIVE</h1>

            <div class="media-tabs" role="tablist" aria-label="Portfolio category">

                <button id="visualizationTab" class="media-tab" type="button" role="tab" aria-selected="false">

                    <span class="media-tab-preview" aria-hidden="true"></span>

                    <span class="media-tab-number">01</span>

                    <span class="media-tab-title">VISUALIZATION</span>

                    <span id="visualizationCount" class="media-tab-count">0 IMAGES</span>

                </button>

                <button id="filmTab" class="media-tab" type="button" role="tab" aria-selected="false">

                    <span class="media-tab-preview" aria-hidden="true"></span>

                    <span class="media-tab-number">02</span>

                    <span class="media-tab-title">FILM</span>

                    <span id="filmCount" class="media-tab-count">0 FILMS</span>

                </button>

            </div>

        </div>

    </section>



    <!-- ===========================
            PROJECT PAGES
    ============================ -->

    <section id="portfolioPages"></section>

    <button id="archiveBtn" type="button" aria-label="Return to project archive" hidden>

        <span aria-hidden="true">&#8592;</span>

        ARCHIVE

    </button>

</div>



<!-- ===========================
        Navigation
=========================== -->

<div id="navigation">

    <button id="prevBtn" aria-label="Previous page">&#10094;</button>

    <div id="pageNumber">

        01 / 03

    </div>

    <div id="pageProgress" role="progressbar" aria-label="Page progress" aria-valuemin="1" aria-valuenow="1" aria-valuemax="3">

        <span id="pageProgressBar"></span>

    </div>

    <button id="nextBtn" aria-label="Next page">&#10095;</button>

</div>



<!-- ===========================
        Image Viewer
=========================== -->

<div id="viewer" role="dialog" aria-modal="true" aria-label="Image viewer" aria-hidden="true">

    <button id="closeViewer" aria-label="Close image">&times;</button>

    <button id="viewerPrev" aria-label="Previous image">&#10094;</button>

    <img id="viewerImage" src="" alt="">

    <div id="viewerSwipeHint" aria-hidden="true" hidden>
        <span>&larr;</span>
        <span>SWIPE</span>
        <span>&rarr;</span>
    </div>

    <div id="viewerError" role="status">IMAGE UNAVAILABLE</div>

    <button id="viewerNext" aria-label="Next image">&#10095;</button>

    <div id="viewerCount">1 / 4</div>

</div>

<!-- ===========================
        Video Viewer
=========================== -->

<div id="videoViewer" role="dialog" aria-modal="true" aria-label="Film player" aria-hidden="true">

    <button id="closeVideoViewer" aria-label="Close video">&times;</button>

    <button id="videoViewerPrev" aria-label="Previous film">&#10094;</button>

    <div class="video-viewer-content">

        <span id="videoViewerLabel">FILM 01</span>

        <video id="videoViewerPlayer" controls playsinline preload="metadata"></video>

        <div id="videoViewerError" role="status">FILM UNAVAILABLE</div>

    </div>

    <button id="videoViewerNext" aria-label="Next film">&#10095;</button>

    <div id="videoViewerCount">1 / 1</div>

</div>

<script src="js/app.js"></script>

</body>

</html>
